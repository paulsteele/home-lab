baseResources:
  persistentVolume:
    nfs:
      path: /volume1/files/docker-registry
    capacity: 4Gi
  persistentVolumeClaim:
    capacity: 4Gi

docker-registry:
  ingress:
    enabled: false
  persistence:
    accessMode: 'ReadWriteOnce'
    enabled: true
    size: 4Gi
    existingClaim: docker-registry-containers
  configData:
    version: 0.1
    log:
      fields:
        service: registry
    storage:
      cache:
        blobdescriptor: inmemory
    http:
      addr: :5000
      headers:
        X-Content-Type-Options: [nosniff]
    health:
      storagedriver:
        enabled: true
        interval: 10s
        threshold: 3
